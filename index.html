<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="2.1.0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2C9CDB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Моя Ферма</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;max-width:100%}

/* ===== SAFE AREA VARIABLES ===== */
:root{
  /* --pad-top is set entirely by JS = ios_status_bar + telegram_header */
  --pad-top: 44px;   /* safe default: at least TG header height */
  --pad-bottom: 0px; /* set by JS */
}

html{ height:100%; overflow:hidden; }

body{
  font-family:'Fredoka',-apple-system,sans-serif;
  position:fixed;
  top:0; left:50%;
  transform:translateX(-50%);
  width:100%; max-width:480px;
  height:100%; height:100dvh;
  overflow:hidden;
  user-select:none; -webkit-user-select:none;
  background:#87CEEB;
  overscroll-behavior:none;
  box-shadow:0 0 50px rgba(0,0,0,.6);
}

/* SCREENS */
.screen{display:none;position:absolute;top:0;left:0;right:0;bottom:0;flex-direction:column;background:#7BB833;overflow:hidden}
.screen.active{display:flex;animation:fade .25s ease-out}
#screen-main{overflow:hidden !important;touch-action:none;background:#87CEEB}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ============ TOP BAR — accounts for status bar + Telegram header ============ */
.topbar{
  background:linear-gradient(180deg,#1E6FB0 0%,#2C9CDB 80%,#2589C2 100%);
  padding-top:calc(10px + var(--pad-top));
  padding-bottom:10px;
  padding-left:8px;padding-right:8px;
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  box-shadow:0 4px 8px rgba(0,0,0,.35),inset 0 -2px 0 rgba(0,0,0,.2);
  position:relative;z-index:50;
  /* Smooth transition when pad-top changes */
  transition:padding-top .15s;
}
.topbar::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0,rgba(255,255,255,.3),transparent 60%);pointer-events:none}

.avatar{
  width:54px;height:54px;border-radius:50%;flex-shrink:0;position:relative;
  background:radial-gradient(circle at 30% 30%,#FFD4A8,#E29A5F);
  border:3px solid #fff;
  box-shadow:0 3px 6px rgba(0,0,0,.4),inset 0 -3px 0 rgba(0,0,0,.15)
}
.avatar svg{width:100%;height:100%;border-radius:50%}
.lvl-badge{
  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,#4FB7FF,#1976D2);
  border:2px solid #fff;border-radius:14px;padding:1px 8px;
  font-size:11px;font-weight:700;color:#fff;white-space:nowrap;
  box-shadow:0 2px 4px rgba(0,0,0,.4)
}

.curs{display:flex;align-items:center;gap:4px;flex:1;justify-content:center}
.cur{
  background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,.55));
  border:1.5px solid rgba(255,255,255,.25);border-radius:22px;
  padding:3px 5px 3px 4px;display:flex;align-items:center;gap:4px;
  font-weight:700;color:#fff;font-size:13px;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.4),0 2px 3px rgba(0,0,0,.2)
}
.cur svg{width:22px;height:22px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.cur .n{min-width:24px;text-align:center;padding:0 2px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.cur .e{display:flex;flex-direction:column;line-height:1.1;align-items:center;padding:0 2px}
.cur .e .n{font-size:12px;min-width:0}
.cur .e .t{font-size:9px;opacity:.85}
.plus{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(180deg,#7CE042,#4CA827);
  border:1.5px solid rgba(255,255,255,.35);
  box-shadow:0 2px 3px rgba(0,0,0,.4),inset 0 -2px 0 rgba(0,0,0,.2);
  color:#fff;font-weight:900;font-size:15px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1
}
.menu-btn{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(180deg,#FFD55A,#E69E12);
  border:2px solid rgba(255,255,255,.4);
  box-shadow:0 3px 5px rgba(0,0,0,.4),inset 0 -3px 0 rgba(0,0,0,.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer
}
.menu-btn b{width:18px;height:2.5px;background:#5D3A1F;border-radius:2px;display:block}

/* ============ FARM SCENE ============ */
/* ============ FARM SCENE ============ */
/* flex:1 fills exactly whatever space is left between topbar, menu and nav */
.farm-scene{
  position:relative;width:100%;overflow:hidden;background:#8DD0E8;
  flex:1;min-height:0;
}
.farm-scene img.bg{display:block;width:100%;height:100%;object-fit:cover;object-position:center 30%}
.farm-scene svg.bg{display:block;width:100%;height:100%}

.fab{
  position:absolute;
  background:rgba(255,255,255,.88);
  border:2px solid rgba(255,255,255,.95);border-radius:14px;
  padding:6px 8px 5px;width:66px;cursor:pointer;
  box-shadow:0 5px 16px rgba(0,0,0,.35),inset 0 -2px 0 rgba(0,0,0,.08);
  display:flex;flex-direction:column;align-items:center;gap:2px;z-index:5;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)
}
.fab svg{width:32px;height:32px}
.fab .lbl{font-size:10px;font-weight:700;color:#5D3A1F}
.fab.tl{top:10px;left:10px}
.fab.tr{top:10px;right:10px}
.fab .badge{
  position:absolute;top:-7px;right:-7px;
  background:radial-gradient(circle at 30% 30%,#FF6565,#C62828);
  color:#fff;width:22px;height:22px;border-radius:50%;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4)
}

.farm-plate{
  position:absolute;left:50%;bottom:12px;transform:translateX(-50%);
  background:linear-gradient(180deg,rgba(91,184,50,.97),rgba(45,120,10,.97));
  border:3px solid rgba(255,255,255,.9);border-radius:24px;
  padding:5px 28px 7px;color:#fff;font-weight:700;font-size:16px;line-height:1;
  text-shadow:0 2px 0 rgba(0,0,0,.3);text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.5),inset 0 -3px 0 rgba(0,0,0,.2);
  z-index:5;white-space:nowrap;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)
}
.farm-plate .lvl{font-size:11px;font-weight:600;opacity:.95;display:block;margin-top:1px}

/* ============ GRID MENU ============ */
.menu-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px;
  background:linear-gradient(180deg,#5FAD1F,#3D8010);
  flex-shrink:0;position:relative
}
.menu-grid::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(180deg,rgba(0,0,0,.3),transparent)}
.menu-grid::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.2))}
.mg-item{
  background:linear-gradient(160deg,#FFE878 0%,#FFD030 50%,#F0A800 100%);
  border:2.5px solid rgba(255,255,255,.7);border-radius:16px;
  padding:6px 4px 7px;min-height:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 5px 12px rgba(180,120,0,.45),inset 0 -4px 0 rgba(120,70,0,.3),inset 0 1px 0 rgba(255,255,255,.6);
  position:relative;transition:transform .1s,box-shadow .1s;
}
.mg-item:active{transform:translateY(2px);box-shadow:0 2px 5px rgba(180,120,0,.3)}
.mg-item.c-green,.mg-item.c-blue,.mg-item.c-orange,.mg-item.c-purple,.mg-item.c-red{
  background:linear-gradient(160deg,#FFE878 0%,#FFD030 50%,#F0A800 100%);
  box-shadow:0 5px 12px rgba(180,120,0,.45),inset 0 -4px 0 rgba(120,70,0,.3),inset 0 1px 0 rgba(255,255,255,.6);
}
.mg-item .ic{width:48px;height:44px;display:flex;align-items:center;justify-content:center}
.mg-item .ic svg{width:100%;height:100%;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25))}
.mg-item .nm{font-size:12px;font-weight:700;color:#5D3A1F;margin-top:2px;letter-spacing:.3px;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.mg-item .badge{
  position:absolute;top:-7px;right:-7px;
  background:radial-gradient(circle at 30% 30%,#FF6565,#C62828);
  color:#fff;width:24px;height:24px;border-radius:50%;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid #fff;box-shadow:0 3px 6px rgba(0,0,0,.35)
}

/* ============ BOTTOM NAV ============ */
.bnav{
  background:linear-gradient(180deg,#4A7A1F,#2D5410);
  padding:5px 0;
  padding-bottom:calc(6px + var(--pad-bottom));
  display:flex;flex-shrink:0;
  box-shadow:0 -4px 12px rgba(0,0,0,.4),inset 0 2px 0 rgba(0,0,0,.3);
  position:relative;z-index:50
}
.bnav .it{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:3px 2px;position:relative}
.bnav .it svg{width:30px;height:30px;transition:transform .15s;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.bnav .it:active svg{transform:scale(.88)}
.bnav .it .nm{font-size:10px;font-weight:600;color:rgba(255,255,255,.85);margin-top:1px}
.bnav .it.active .nm{color:#FFD55A;font-weight:700;text-shadow:0 0 6px rgba(255,213,90,.7)}
.bnav .it.active::before{
  content:'';position:absolute;top:-2px;left:25%;right:25%;height:3px;
  background:#FFD55A;border-radius:0 0 4px 4px;
  box-shadow:0 0 10px rgba(255,213,90,.9)
}
.bnav .badge{
  position:absolute;top:0;right:calc(50% - 22px);
  background:radial-gradient(circle at 30% 30%,#FF6565,#C62828);
  color:#fff;width:18px;height:18px;border-radius:50%;
  font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid #fff
}

/* ============ SCREEN HEADER (wood) ============ */
.sh-header{
  background:
    linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.4)),
    repeating-linear-gradient(90deg,#9A6B45 0,#9A6B45 14px,#8B5E3C 14px,#8B5E3C 28px);
  padding-top:calc(10px + var(--pad-top));
  padding-bottom:16px;
  padding-left:10px;padding-right:10px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  box-shadow:0 5px 10px rgba(0,0,0,.4);position:relative;z-index:10
}
.sh-header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(180deg,#B5825A,transparent)}

.back-btn{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(180deg,#7CE042,#4CA827);
  border:2px solid rgba(255,255,255,.4);
  color:#fff;font-size:22px;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 3px 6px rgba(0,0,0,.4),inset 0 -3px 0 rgba(0,0,0,.2)
}
.back-btn:active{transform:translateY(2px)}

.wood-sign{
  flex:1;text-align:center;position:relative;
  background:
    repeating-linear-gradient(0deg,transparent 0,transparent 5px,rgba(0,0,0,.07) 5px,rgba(0,0,0,.07) 6px),
    linear-gradient(180deg,#C49671 0%,#9A6B45 50%,#7A4F2F 100%);
  border:2.5px solid #5D3A1F;border-radius:10px;
  padding:8px 10px 6px;
  box-shadow:0 5px 10px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,220,180,.4),inset 0 -3px 0 rgba(0,0,0,.25)
}
.wood-sign::before,.wood-sign::after{
  content:'';position:absolute;width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#aaa,#444);
  box-shadow:inset 0 -1px 0 rgba(0,0,0,.4);top:5px
}
.wood-sign::before{left:6px}
.wood-sign::after{right:6px}
.wood-sign .ttl{
  font-size:22px;font-weight:700;color:#fff;letter-spacing:1.5px;line-height:1;
  text-shadow:0 2px 0 rgba(0,0,0,.4),0 0 10px rgba(255,200,100,.3)
}
.wood-sign .lvl-pill{
  display:inline-block;margin-top:4px;
  background:linear-gradient(180deg,#FFD55A,#E69E12);
  color:#5D3A1F;border:1.5px solid #5D3A1F;border-radius:12px;
  padding:1px 12px;font-size:11px;font-weight:700;
  box-shadow:0 2px 3px rgba(0,0,0,.3)
}

/* ============ ANIMAL INTERIOR SCENE ============ */
.scene-int{position:relative;width:100%;aspect-ratio:480/360;flex-shrink:0;overflow:hidden;background:#3D2517}
.scene-int svg.bg{display:block;width:100%;height:100%}

.cap-board{
  position:absolute;top:12px;right:12px;
  background:linear-gradient(180deg,#2A2A2A,#0E0E0E);
  border:3px solid #5D3A1F;border-radius:8px;padding:6px 12px;
  color:#FFE9B0;text-align:center;font-weight:700;
  box-shadow:0 5px 10px rgba(0,0,0,.6);z-index:5
}
.cap-board .row{display:flex;align-items:center;gap:6px;justify-content:center}
.cap-board .row svg{width:22px;height:22px}
.cap-board .row span{font-size:20px;line-height:1}
.cap-board .lbl{font-size:9px;opacity:.85;margin-top:1px}

/* ============ INFO PANELS ============ */
.panels{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;
  background:linear-gradient(180deg,#5FAD1F,#3D8010);
  flex-shrink:0
}
.panel{
  background:linear-gradient(160deg,#FEFCF0,#F4E4B0);
  border:2.5px solid #fff;border-radius:16px;
  padding:8px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;
  box-shadow:0 6px 14px rgba(0,0,0,.2),inset 0 -4px 0 rgba(139,94,60,.18),inset 0 1px 0 rgba(255,255,255,.9)
}
.p-ttl{
  font-size:9px;font-weight:700;color:#8B5E3C;text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:4px;line-height:1.1;
  background:rgba(139,94,60,.08);border-radius:6px;padding:2px 6px;width:100%
}
.p-ic{width:38px;height:38px;display:flex;align-items:center;justify-content:center;margin:2px 0}
.p-ic svg{width:100%;height:100%;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2))}
.p-big{font-size:24px;font-weight:700;color:#1B5E20;line-height:1;margin:2px 0}
.p-sub{font-size:11px;color:#4A2F0A;font-weight:600;line-height:1.25}
.p-sub b{color:#2D5410}
.lstar{
  width:40px;height:40px;position:relative;display:flex;align-items:center;justify-content:center;margin:3px 0;
  filter:drop-shadow(0 3px 5px rgba(0,0,0,.3))
}
.lstar svg{width:100%;height:100%}
.lstar .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:17px;text-shadow:0 1px 2px rgba(0,0,0,.6)}

.btn{
  border:1.5px solid rgba(255,255,255,.4);border-radius:12px;
  padding:7px 6px;font-family:inherit;font-size:11px;font-weight:700;color:#fff;
  cursor:pointer;width:100%;margin-top:auto;
  display:flex;align-items:center;justify-content:center;gap:4px;line-height:1.1;
  box-shadow:0 4px 8px rgba(0,0,0,.3),inset 0 -3px 0 rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.25)
}
.btn:active{transform:translateY(2px);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn.green{background:linear-gradient(180deg,#7CE042,#4CA827)}
.btn.blue{background:linear-gradient(180deg,#5CC8FF,#1E8DD2)}
.btn.orange{background:linear-gradient(180deg,#FFB54F,#E69012)}
.btn.purple{background:linear-gradient(180deg,#B07CD9,#7E3FA8)}
.btn.gold{background:linear-gradient(180deg,#FFE066,#E8A800);color:#5D3A1F;border-color:rgba(255,255,255,.5)}
.btn:disabled{background:linear-gradient(180deg,#C8C8C8,#909090);cursor:not-allowed;opacity:.65;box-shadow:none}
.gold-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:11px 14px;
  background:linear-gradient(180deg,#FFE066,#E8A800);
  color:#5D3A1F;font-family:'Fredoka',-apple-system,sans-serif;font-size:14px;font-weight:700;
  border:2px solid rgba(255,255,255,.55);border-radius:14px;cursor:pointer;
  box-shadow:0 5px 12px rgba(200,140,0,.45),inset 0 -3px 0 rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.35);
  text-shadow:0 1px 0 rgba(255,255,255,.3);letter-spacing:.3px;
  transition:transform .1s,box-shadow .1s;
}
.gold-btn:active{transform:translateY(2px);box-shadow:0 2px 4px rgba(200,140,0,.3)}
.btn .mc{width:14px;height:14px;flex-shrink:0}

.panel-stack{margin-top:6px;width:100%;display:flex;flex-direction:column;gap:3px}
.panel-stack .ln{font-size:11px;color:#5D3A1F;font-weight:600;line-height:1.2}

/* ============ BUILDING TABS ============ */
.btabs{
  background:linear-gradient(180deg,#4A7A1F,#2D5410);
  padding:5px 4px;
  padding-bottom:calc(6px + var(--pad-bottom));
  display:flex;gap:4px;flex-shrink:0;
  box-shadow:0 -4px 10px rgba(0,0,0,.4);position:relative;z-index:10
}
.btab{
  flex:1;background:linear-gradient(180deg,#7A4F2F,#5D3A1F);
  border:1.5px solid rgba(255,255,255,.15);border-radius:12px;
  padding:4px 2px 5px;text-align:center;cursor:pointer;color:rgba(255,255,255,.9);
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.25);transition:all .15s
}
.btab.active{
  background:linear-gradient(180deg,#FFD55A,#E69E12);color:#5D3A1F;
  border-color:#fff;
  box-shadow:0 0 12px rgba(255,213,90,.7),inset 0 -2px 0 rgba(139,94,60,.3)
}
.btab .ic{width:28px;height:28px;margin:0 auto}
.btab .ic svg{width:100%;height:100%;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.btab .nm{font-size:10px;font-weight:700;margin-top:1px}

/* ============ ANIMALS OVERVIEW ============ */
.aov-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;
  background:linear-gradient(180deg,#5FAD1F,#3D8010);flex-shrink:0
}
.aov-card{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2.5px solid #fff;border-radius:18px;padding:8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 5px 10px rgba(0,0,0,.25),inset 0 -3px 0 rgba(139,94,60,.2);
  position:relative;transition:transform .12s
}
.aov-card:active{transform:translateY(3px)}
.aov-pic{width:100%;height:74px;border-radius:12px;overflow:hidden;border:2px solid #5D3A1F;background:#87CEEB}
.aov-pic svg{display:block;width:100%;height:100%}
.aov-nm{font-size:14px;font-weight:700;color:#5D3A1F;margin-top:5px}
.aov-meta{font-size:11px;color:#8B5E3C;font-weight:600}
.aov-card .badge{position:absolute;top:-6px;right:-6px;background:radial-gradient(circle at 30% 30%,#FF6565,#C62828);color:#fff;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ============ FIELDS ============ */
.field-bar{
  background:linear-gradient(180deg,#4A7A1F,#2D5410);
  padding:8px 12px;color:#FFD55A;font-size:12px;font-weight:600;text-align:center;
  flex-shrink:0;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25)
}
.field-bar b{color:#fff}
.fields-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.field{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2.5px solid #fff;border-radius:18px;padding:10px;text-align:center;cursor:pointer;
  box-shadow:0 5px 10px rgba(0,0,0,.2),inset 0 -3px 0 rgba(139,94,60,.2)
}
.field .ic{width:58px;height:58px;margin:0 auto}
.field .ic svg{width:100%;height:100%}
.field .nm{font-size:13px;font-weight:700;color:#5D3A1F;margin-top:3px}
.field .amt{font-size:22px;font-weight:700;color:#2D5410;line-height:1;margin:2px 0}
.pill{
  display:inline-block;background:linear-gradient(180deg,#7CE042,#4CA827);
  color:#fff;border-radius:12px;padding:3px 12px;
  font-size:11px;font-weight:700;
  box-shadow:0 2px 4px rgba(0,0,0,.2)
}
.collect-all{
  margin:0 10px 10px;padding:14px;font-family:inherit;font-size:16px;font-weight:700;
  color:#5D3A1F;
  background:linear-gradient(180deg,#FFE066,#E8A800);
  border:2px solid rgba(255,255,255,.55);border-radius:18px;width:calc(100% - 20px);cursor:pointer;
  box-shadow:0 5px 12px rgba(200,140,0,.4),inset 0 -3px 0 rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-shadow:0 1px 0 rgba(255,255,255,.25);
}
.collect-all:active{transform:translateY(2px);box-shadow:0 2px 4px rgba(200,140,0,.3)}

/* ============ MARKET ============ */
.m-list{padding:8px}
.m-item{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2px solid #fff;border-radius:14px;padding:10px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 8px rgba(0,0,0,.15),inset 0 -2px 0 rgba(139,94,60,.15)
}
.m-icw{width:42px;height:42px;flex-shrink:0}
.m-icw svg{width:100%;height:100%}
.m-info{flex:1}
.m-nm{font-size:14px;font-weight:700;color:#5D3A1F}
.m-price{display:flex;align-items:center;gap:4px;font-size:12px;color:#8B5E3C;font-weight:600}
.m-price svg{width:14px;height:14px}
.m-have{font-size:11px;color:#2D5410;font-weight:700}

/* ============ ORDERS ============ */
.o-card{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2.5px solid #fff;border-radius:18px;padding:12px;margin:8px;
  box-shadow:0 5px 10px rgba(0,0,0,.2),inset 0 -3px 0 rgba(139,94,60,.2)
}
.o-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.o-ic{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(180deg,#FFD98A,#F4A623);
  border:2.5px solid #fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 5px rgba(0,0,0,.25)
}
.o-ic svg{width:75%;height:75%}
.o-nm{font-size:15px;font-weight:700;color:#5D3A1F;flex:1}
.o-rew{
  background:linear-gradient(180deg,#FFD55A,#E69E12);
  color:#5D3A1F;border:1.5px solid #fff;border-radius:12px;
  padding:4px 10px;font-size:13px;font-weight:700;
  box-shadow:0 2px 4px rgba(0,0,0,.2)
}
.o-needs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.need{
  background:linear-gradient(180deg,#E8F5E9,#C8E6C9);
  border:1.5px solid #7CE042;border-radius:10px;
  padding:4px 8px;font-size:12px;font-weight:700;color:#2D5410;
  display:flex;align-items:center;gap:5px
}
.need.x{background:linear-gradient(180deg,#FFEBEE,#FFCDD2);border-color:#FF5252;color:#C62828}
.need svg{width:18px;height:18px}

/* ============ TOAST & MODAL ============ */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,#5D3A1F,#3A2410);color:#FFE9B0;
  padding:10px 22px;border-radius:24px;
  font-size:14px;font-weight:700;z-index:300;
  border:2px solid #FFD55A;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  max-width:80%;text-align:center
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}

.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
  backdrop-filter:blur(4px)
}
.modal.hide{display:none}
.modal-box{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:4px solid #FFD55A;border-radius:24px;
  padding:24px;max-width:320px;width:100%;text-align:center;
  box-shadow:0 15px 50px rgba(0,0,0,.6)
}
.modal-ttl{font-size:22px;font-weight:700;color:#5D3A1F;margin-bottom:4px}
.modal-sub{font-size:13px;color:#8B5E3C;font-weight:600;margin-bottom:14px}
.modal-rew{width:80px;height:80px;margin:0 auto 8px;filter:drop-shadow(0 5px 10px rgba(255,213,90,.7))}
.modal-amt{font-size:28px;font-weight:700;color:#E69E12;margin-bottom:16px}
.modal-btn{
  background:linear-gradient(180deg,#FFE066,#E8A800);color:#5D3A1F;border:2px solid rgba(255,255,255,.55);
  border-radius:16px;padding:12px 32px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 5px 12px rgba(200,140,0,.4),inset 0 -3px 0 rgba(0,0,0,.18);
  text-shadow:0 1px 0 rgba(255,255,255,.25);
}

/* ============ SCROLL ============ */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:5px}
.scroll::-webkit-scrollbar-thumb{background:rgba(139,94,60,.35);border-radius:3px}

/* Achievement, quest, research card share styles */
.card{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2px solid #fff;border-radius:14px;padding:12px;margin:8px;
  box-shadow:0 4px 10px rgba(0,0,0,.15),inset 0 -2px 0 rgba(139,94,60,.15)
}
.card-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-ic{
  width:46px;height:46px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(180deg,#FFD98A,#F4A623);
  border:2px solid #fff;font-size:24px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 4px rgba(0,0,0,.2)
}
.card-ic svg{width:70%;height:70%}
.card-info{flex:1}
.card-nm{font-size:14px;font-weight:700;color:#5D3A1F}
.card-desc{font-size:11px;color:#8B5E3C;font-weight:600;line-height:1.3}
.card-rew{
  background:linear-gradient(180deg,#FFD55A,#E69E12);
  color:#5D3A1F;border-radius:12px;padding:4px 10px;
  font-size:12px;font-weight:700;border:1.5px solid #fff
}
.progress{
  height:8px;background:rgba(139,94,60,.25);border-radius:4px;overflow:hidden;
  border:1.5px solid #8B5E3C;margin-top:6px
}
.progress .fill{
  height:100%;background:linear-gradient(180deg,#FFD55A,#E69E12);
  border-radius:3px;transition:width .4s;
  box-shadow:0 0 6px rgba(255,213,90,.6)
}
.p-text{font-size:11px;color:#5D3A1F;font-weight:700;margin-top:3px}

.section-bar{
  background:linear-gradient(180deg,#5A9928,#3D7A1A);
  padding:8px 12px;color:#FFD55A;
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  text-align:center;text-shadow:0 2px 0 rgba(0,0,0,.3)
}

.daily-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;
  background:linear-gradient(180deg,#5A9928,#3D7A1A)
}
.daily-card{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2px solid #fff;border-radius:12px;padding:6px;text-align:center;
  box-shadow:0 3px 6px rgba(0,0,0,.2),inset 0 -2px 0 rgba(139,94,60,.15)
}
.daily-card svg{width:32px;height:32px;margin:0 auto}
.daily-card .n{font-weight:700;font-size:14px;color:#2D5410;line-height:1}
.daily-card .l{font-size:9px;color:#8B5E3C;font-weight:600}

/* Research */
.r-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.r-card{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2.5px solid #fff;border-radius:16px;padding:12px;text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,.2),inset 0 -3px 0 rgba(139,94,60,.2)
}
.r-ic{
  width:60px;height:60px;border-radius:14px;margin:0 auto 6px;
  background:linear-gradient(180deg,#C39EE9,#7E3FA8);
  border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 3px 6px rgba(0,0,0,.25)
}
.r-nm{font-size:13px;font-weight:700;color:#5D3A1F}
.r-desc{font-size:11px;color:#8B5E3C;font-weight:600;margin:5px 0;min-height:30px;line-height:1.3}
.r-price{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(180deg,#FFD55A,#E69E12);
  color:#5D3A1F;border:1.5px solid #fff;border-radius:12px;
  padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:6px
}
.r-price svg{width:14px;height:14px}

/* Responsive scaling */
@media (max-height:700px){.scene-int{aspect-ratio:480/300}}
@media (max-height:600px){.scene-int{aspect-ratio:480/240}.panels{padding:6px;gap:5px}.panel{padding:6px 4px}}
@media (max-width:360px){.menu-grid{gap:6px;padding:8px}.mg-item{min-height:84px}.cur{font-size:12px}.cur svg{width:20px;height:20px}}

/* chest inline in tasks – no modal needed */

/* ============ FIELD PLOTS ============ */
.plots-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.plot{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2.5px solid #fff;border-radius:18px;padding:10px;
  box-shadow:0 5px 10px rgba(0,0,0,.2),inset 0 -3px 0 rgba(139,94,60,.2);
  min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;cursor:pointer;transition:transform .12s
}
.plot:active{transform:translateY(2px)}
.plot.empty{background:linear-gradient(180deg,#C49671 0%,#8B5E3C 100%);border-color:#5D3A1F}
.plot.empty .plot-soil{
  width:100%;height:60px;border-radius:12px;
  background:repeating-linear-gradient(180deg,#5D3A1F 0,#5D3A1F 4px,#3A2410 4px,#3A2410 8px);
  opacity:.8;margin-bottom:6px
}
.plot.growing{background:linear-gradient(180deg,#E8F5E9,#C8E6C9)}
.plot.ready{background:linear-gradient(180deg,#FFF9C4,#FFF176);animation:readyPulse 2s ease-in-out infinite}
@keyframes readyPulse{0%,100%{box-shadow:0 5px 10px rgba(0,0,0,.2),0 0 0 0 rgba(255,213,90,.5)}50%{box-shadow:0 5px 10px rgba(0,0,0,.2),0 0 0 8px rgba(255,213,90,0)}}
.plot-ic{width:54px;height:54px;display:flex;align-items:center;justify-content:center;margin:4px 0}
.plot-ic svg{width:100%;height:100%}
.plot-nm{font-size:13px;font-weight:700;color:#5D3A1F}
.plot-timer{font-size:12px;font-weight:700;color:#2D5410;margin:3px 0}
.grow-bar{width:100%;height:7px;background:rgba(139,94,60,.25);border-radius:4px;overflow:hidden;border:1.5px solid #8B5E3C;margin:3px 0}
.grow-fill{height:100%;background:linear-gradient(90deg,#7CE042,#4CA827);border-radius:3px;transition:width .5s}
.plot-btn{font-family:inherit;font-size:11px;font-weight:700;color:#fff;border:1.5px solid rgba(255,255,255,.35);border-radius:10px;padding:6px 10px;cursor:pointer;margin-top:4px;width:100%;box-shadow:0 3px 5px rgba(0,0,0,.25),inset 0 -2px 0 rgba(0,0,0,.2)}
.plot-btn.plant{background:linear-gradient(180deg,#8B5E3C,#5D3A1F)}
.plot-btn.harvest{background:linear-gradient(180deg,#FFE066,#E8A800);color:#5D3A1F;border-color:rgba(255,255,255,.5)}
.plot-btn:active{transform:translateY(2px)}
/* Seed selection modal */
.seed-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:300;backdrop-filter:blur(3px)}
.seed-modal.hide{display:none}
.seed-sheet{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border-radius:24px 24px 0 0;
  padding:20px;
  padding-bottom:calc(20px + var(--pad-bottom));
  width:100%;max-width:480px;
  border:3px solid #FFD55A;border-bottom:none;
  box-shadow:0 -8px 30px rgba(0,0,0,.4)
}
.seed-ttl{font-size:18px;font-weight:700;color:#5D3A1F;text-align:center;margin-bottom:14px}
.seed-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.seed-item{
  background:linear-gradient(180deg,#fff,#FFF4D6);
  border:2.5px solid #fff;border-radius:14px;padding:12px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,.15),inset 0 -2px 0 rgba(139,94,60,.15);
  transition:transform .12s
}
.seed-item:active{transform:scale(.97)}
.seed-ic{width:40px;height:40px;flex-shrink:0}
.seed-ic svg{width:100%;height:100%}
.seed-info .s-nm{font-size:13px;font-weight:700;color:#5D3A1F}
.seed-info .s-time{font-size:11px;color:#8B5E3C;font-weight:600}
.seed-info .s-cost{font-size:11px;font-weight:700;color:#2D5410}
.seed-cancel{margin-top:10px;width:100%;padding:12px;background:linear-gradient(180deg,#C0C0C0,#888);color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}

/* ============ FEEDING UI ============ */
.feed-bar{
  width:100%;height:8px;background:rgba(139,94,60,.25);border-radius:4px;
  overflow:hidden;border:1.5px solid #8B5E3C;margin:3px 0
}
.feed-fill{height:100%;border-radius:3px;transition:width .5s}
.feed-fill.ok{background:linear-gradient(90deg,#7CE042,#4CA827)}
.feed-fill.warn{background:linear-gradient(90deg,#FFB54F,#F4A623)}
.feed-fill.bad{background:linear-gradient(90deg,#FF6565,#C62828)}
.hungry-badge{
  position:absolute;top:-5px;left:-5px;
  background:radial-gradient(circle at 30% 30%,#FF6565,#C62828);
  color:#fff;border-radius:50%;width:24px;height:24px;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;animation:pulse 1.2s infinite
}
/* Animal slot grid for coop/barn */
.animal-slots-dynamic{
  position:absolute;
  left:0;right:0;
  top:30%;bottom:20%;
  display:flex;flex-wrap:wrap;
  align-items:center;justify-content:center;
  gap:6px;padding:8px;
  pointer-events:none;
  z-index:3
}
.aslot{
  width:68px;height:68px;
  background:rgba(0,0,0,.15);
  border:2px dashed rgba(255,200,100,.3);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  position:relative
}
.aslot.occupied{
  border-color:transparent;
  background:rgba(255,240,200,.1);
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))
}
.aslot svg{width:62px;height:62px}
.aslot .died-x{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:28px;background:rgba(0,0,0,.5);border-radius:10px
}
.life-bar{
  position:absolute;bottom:-3px;left:3px;right:3px;height:4px;
  background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden
}
.life-fill{height:100%;border-radius:2px}
.life-fill.new{background:#7CE042}
.life-fill.mid{background:#FFD55A}
.life-fill.old{background:#FF6565}
/* Empty barn message */
.empty-barn{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:rgba(0,0,0,.4);color:#FFE9B0;font-weight:700;z-index:3
}
.empty-barn .ei{font-size:44px}
.empty-barn .et{font-size:15px}

/* ============ WAREHOUSE ============ */
.warehouse-section{padding:10px}
.wh-title{font-size:14px;font-weight:700;color:#FFD55A;text-transform:uppercase;letter-spacing:1px;
  text-shadow:0 2px 0 rgba(0,0,0,.3);margin-bottom:8px;padding:0 2px}
.wh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.wh-item{
  background:linear-gradient(180deg,#FFF4D6,#F0E0A8);
  border:2.5px solid #fff;border-radius:14px;padding:10px 6px;
  text-align:center;
  box-shadow:0 4px 8px rgba(0,0,0,.2),inset 0 -3px 0 rgba(139,94,60,.2)
}
.wh-item svg{width:42px;height:42px;margin:0 auto 4px;display:block}
.wh-item .wn{font-size:13px;font-weight:700;color:#5D3A1F}
.wh-item .wa{font-size:22px;font-weight:700;color:#2D5410;line-height:1}
.wh-item .wl{font-size:10px;color:#8B5E3C;font-weight:600}

body.dark #screen-main{background:#1A1A2E}

body.dark .plot.ready{background:linear-gradient(180deg,#1E1A00,#2A2400)}
body.dark .plot .nm{color:#FFE9B0}
body.dark .plot .plot-timer{color:#7CE042}
body.dark .field-bar{background:linear-gradient(180deg,#0D1A05,#060E02);color:#FFD55A}
body.dark .field-bar b{color:#fff}

/* market */
body.dark .m-list{background:transparent}
body.dark .m-item{background:linear-gradient(160deg,#1E1E2E,#252535);border-color:rgba(255,213,90,.2)}
body.dark .m-nm{color:#FFE9B0}
body.dark .m-price{color:rgba(255,200,100,.6)}
body.dark .m-have{color:#7CE042}

/* orders */
body.dark .o-card{background:linear-gradient(160deg,#1E1E2E,#252535);border-color:rgba(255,213,90,.2)}
body.dark .o-nm{color:#FFE9B0}

/* warehouse */
body.dark .wh-item{background:linear-gradient(160deg,#1E1E2E,#252535);border-color:rgba(255,213,90,.2)}
body.dark .wh-item .wn{color:#FFE9B0}
body.dark .wh-item .wa{color:#7CE042}
body.dark .wh-item .wl{color:rgba(255,200,100,.6)}
body.dark .warehouse-section .wh-title{color:#FFD55A}

/* seed modal */
body.dark .seed-sheet{background:linear-gradient(180deg,#1E1E2E,#252535);border-color:rgba(255,213,90,.3)}
body.dark .seed-ttl{color:#FFE9B0}
body.dark .seed-item{background:linear-gradient(160deg,#252535,#2A2A40);border-color:rgba(255,213,90,.2)}
body.dark .seed-info .s-nm{color:#FFE9B0}
body.dark .seed-info .s-time{color:rgba(255,200,100,.6)}
body.dark .seed-info .s-cost{color:#7CE042}
body.dark .seed-cancel{background:linear-gradient(180deg,#333,#222)}

/* cap board */
body.dark .cap-board{background:linear-gradient(180deg,#0A0A1A,#050510);border-color:rgba(255,213,90,.3)}

/* toast */
body.dark #toast{background:linear-gradient(180deg,#1A1A2E,#0D0D1A);border-color:rgba(255,213,90,.5)}

/* modal */
body.dark .modal-box{background:linear-gradient(180deg,#1E1E2E,#252535);border-color:rgba(255,213,90,.4)}
body.dark .modal-ttl{color:#FFE9B0}
body.dark .modal-sub{color:rgba(255,200,100,.7)}
body.dark .modal-amt{color:#FFD55A}

/* section bar */
body.dark .section-bar{background:linear-gradient(180deg,#0D1A05,#060E02)}

/* aov pic */
body.dark .aov-pic{border-color:rgba(255,213,90,.3)}

/* daily grid */
body.dark .daily-card{background:linear-gradient(160deg,#1E1E2E,#252535);border-color:rgba(255,213,90,.2)}
body.dark .daily-card .n{color:#7CE042}
body.dark .daily-card .l{color:rgba(255,200,100,.6)}

/* collect-all btn */
body.dark .collect-all{box-shadow:0 5px 12px rgba(0,0,0,.5),inset 0 -3px 0 rgba(0,0,0,.3)}

/* progress bars */
body.dark .progress{background:rgba(255,213,90,.1);border-color:rgba(255,213,90,.2)}
body.dark .feed-bar{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1)}
body.dark .grow-bar{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1)}
body.dark .life-bar{background:rgba(0,0,0,.5)}

/* need chips */
body.dark .need{background:linear-gradient(180deg,#0E2010,#162818);border-color:#4CA827;color:#7CE042}
body.dark .need.x{background:linear-gradient(180deg,#200E0E,#281616);border-color:#C62828;color:#FF6565}

/* wood sign */
body.dark .wood-sign{
  background:repeating-linear-gradient(0deg,transparent 0,transparent 5px,rgba(0,0,0,.15) 5px,rgba(0,0,0,.15) 6px),
    linear-gradient(180deg,#1A0E05 0%,#0D0702 50%,#050302 100%);
  border-color:#3A2010
}

/* empty barn */
body.dark .empty-barn{background:rgba(0,0,0,.6)}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>

function todayStr(){ return new Date().toISOString().slice(0,10); }

function initDailyTasks(){
  const today = todayStr();
  if(STATE.tasks.date !== today){
    STATE.tasks.date = today;
    STATE.tasks.progress = {};
    STATE.tasks.claimed = {};
    // Auto-complete login
    STATE.tasks.progress['login'] = 1;
  }
}

function addTaskProgress(id, amount=1){
  initDailyTasks();
  const cfg = TASKS_CFG.find(t=>t.id===id);
  if(!cfg) return;
  const cur = STATE.tasks.progress[id] || 0;
  if(cur >= cfg.goal) return;
  STATE.tasks.progress[id] = Math.min(cfg.goal, cur + amount);
  if(STATE.tasks.progress[id] >= cfg.goal){
    toast(`✅ Задание выполнено: ${cfg.title}!`);
  }
}

function gainXP(amount){
  STATE.xp = (STATE.xp||0) + amount;
  const xpNeeded = STATE.farmLevel * 200;
  if(STATE.xp >= xpNeeded){
    STATE.xp -= xpNeeded;
    STATE.farmLevel++;
    STATE.coins += STATE.farmLevel * 100;
    toast(`🎉 Уровень фермы ${STATE.farmLevel}! +${STATE.farmLevel*100}🪙`);
    updateDisplays();
  }
}

function claimTask(id){
  initDailyTasks();
  const cfg = TASKS_CFG.find(t=>t.id===id);
  if(!cfg) return;
  if((STATE.tasks.progress[id]||0) < cfg.goal){ toast('Задание не выполнено!'); return; }
  if(STATE.tasks.claimed[id]){ toast('Награда уже получена!'); return; }
  STATE.tasks.claimed[id] = true;
  STATE.coins += cfg.r;
  if(cfg.rg) STATE.gems += cfg.rg;
  gainXP(50);
  saveGame();
  toast(`🎁 +${cfg.r}🪙${cfg.rg?' +'+cfg.rg+'💎':''} за задание!`);
  refresh();
}

function allTasksDone(){
  initDailyTasks();
  return TASKS_CFG.every(t=>(STATE.tasks.progress[t.id]||0)>=t.goal);
}
function allTasksClaimed(){
  initDailyTasks();
  return TASKS_CFG.every(t=>STATE.tasks.claimed[t.id]);
}

// ====================== ANIMAL HELPERS ======================
function getAliveAnimals(k){ return (STATE.b[k].animals||[]).filter(a=>a.alive); }
function getAliveCount(k){ return getAliveAnimals(k).length; }
function isHungry(k){
  const b=STATE.b[k]; const now=Date.now();
  return getAliveAnimals(k).some(a=>now-a.lastFed>b.feedEvery);
}
function ageLabel(born){
  const d = Math.floor((Date.now()-born)/(24*3600*1000));
  return `${d} дн.`;
}
function lifePercent(k, born){
  const lifespan = ANIMALS[k].lifespan;
  return Math.min(100, (Date.now()-born)/lifespan*100);
}
function feedCost(k){
  const b=STATE.b[k]; const cnt=getAliveCount(k);
  return {food:b.food, amt:b.foodAmt*cnt};
}
function checkAnimalDeaths(){
  Object.entries(STATE.b).forEach(([k,b])=>{
    const now=Date.now();
    const lifespan=ANIMALS[k].lifespan;
    b.animals.forEach(a=>{
      if(a.alive && now-a.born >= lifespan){
        a.alive=false;
        toast(`💀 Одно из животных (${ANIMALS[k].ru.toLowerCase()}) умерло от старости`);
      }
    });
  });
}

      <div class="p-sub">${cfg.prodName} на складе</div>

      ${cnt>0?`<div class="p-sub">Нужно: <b>${fc.amt} ${foodNames[b.food]}</b></div>`:''}

function animalSlotsOverlay(animal){
  const b = STATE.b[animal];
  const max = b.max[b.lvl-1];
  const alive = getAliveAnimals(animal);
  const cnt = alive.length;

  if(cnt === 0){
    return `<div class="empty-barn">
      <div class="ei">🏚</div>
      <div class="et">Нет животных</div>
      <div style="font-size:12px;opacity:.75;margin-top:2px">Купи ${ANIMALS[animal].nameSing} ниже</div>
    </div>`;
  }

  const now = Date.now();
  // How many slots to show (alive + up to 2 empty to indicate capacity)
  const showSlots = Math.min(max, Math.max(cnt, cnt + 1));
  const slots = [];

  for(let i = 0; i < showSlots; i++){
    const a = alive[i];
    if(a){
      const lifePct = lifePercent(animal, a.born);
      const lc = lifePct < 50 ? 'new' : lifePct < 80 ? 'mid' : 'old';
      const isHung = now - a.lastFed > b.feedEvery;
      // Size varies by animal type: chickens smaller, cow bigger
      const sizes = {chicken:58, pig:62, sheep:60, cow:64};
      const sz = sizes[animal] || 60;
      slots.push(`<div class="aslot occupied">
        <svg width="${sz}" height="${sz}" viewBox="0 0 100 100"><use href="#${ANIMALS[animal].icon}"/></svg>
        <div class="life-bar"><div class="life-fill ${lc}" style="width:${(100-lifePct).toFixed(0)}%"></div></div>
        ${isHung ? '<div style="position:absolute;top:-5px;right:-5px;font-size:16px;line-height:1">😰</div>' : ''}
      </div>`);
    } else {
      slots.push(`<div class="aslot"></div>`);
    }
  }

  // Pick layout style based on animal
  const wrapStyle = animal === 'chicken'
    ? 'top:28%;bottom:18%;align-items:flex-start;padding-top:8px'
    : 'top:25%;bottom:15%';

  return `<div class="animal-slots-dynamic" style="${wrapStyle}">${slots.join('')}</div>`;
}

function renderFields(){

    }
    const crop = CROPS[p.crop];
    const elapsed = now - p.plantedAt;
    const total = p.readyAt - p.plantedAt;
    const pct = Math.min(100, elapsed/total*100);
    const remaining = Math.max(0, p.readyAt - now);
    const remText = remaining > 0 ? fmtTime(remaining) : 'Готово!';
    if(p.state==='ready'){
      return `<div class="plot ready" onclick="harvestPlot(${p.id})">

function fmtTime(ms){
  const s=Math.floor(ms/1000);
  if(s<60) return `${s}с`;
  const m=Math.floor(s/60);
  if(m<60) return `${m}м ${s%60}с`;
  const h=Math.floor(m/60);
  return `${h}ч ${m%60}м`;
}

function claimAllBonus(){
  if(STATE.tasks.claimed['__all']){ toast('Бонус уже получен!'); return; }
  if(!allTasksDone()){ toast('Сначала выполни все задания!'); return; }
  STATE.tasks.claimed['__all'] = true;
  STATE.coins += 500;
  STATE.gems += 20;
  toast('🏆 Бонус за все задания! +500🪙 +20💎');
  refresh();
}

function sellFromWarehouse(key, price){
  const amt = STATE.inv[key]||0;
  if(amt<=0){ toast('Нечего продавать'); return; }
  STATE.coins += amt * price;
  STATE.inv[key] = 0;
  toast(`+${fmt(amt*price)} 🪙 за ${amt} шт.`);
  refresh();
}

function sellAllProducts(){
  const prices = {eggs:7,milk:10,wool:9,meat:15};
  let total = 0;
  Object.entries(prices).forEach(([k,p])=>{
    total += (STATE.inv[k]||0) * p;
    STATE.inv[k] = 0;
  });
  if(total===0){ toast('Нет продукции для продажи'); return; }
  STATE.coins += total;
  toast(`+${fmt(total)} 🪙 за всю продукцию!`);
  refresh();
}

function showScreen(id){
  $$('.screen').forEach(s => s.classList.remove('active'));
  const screen = document.getElementById(id);
  if (!screen) return;
  if (RENDERERS[id]) {
    screen.innerHTML = RENDERERS[id]();
  }
  screen.classList.add('active');
  updateDisplays();
  if (window.Telegram?.WebApp) {
    try { window.Telegram.WebApp.HapticFeedback?.impactOccurred('light'); } catch(e){}
  }
}

function updateDisplays(){
  initDailyTasks();
  $$('[data-coins]').forEach(el => el.textContent = fmt(STATE.coins));
  $$('[data-gems]').forEach(el => el.textContent = STATE.gems);
  $$('[data-ton]').forEach(el => el.textContent = STATE.ton.toFixed(2));
  $$('[data-flevel]').forEach(el => el.textContent = STATE.farmLevel);
  const mb = document.getElementById('main-lvl-badge');
  if(mb) mb.textContent = STATE.farmLevel;
  Object.keys(STATE.inv).forEach(k => {
    $$(`[data-inv="${k}"]`).forEach(el => el.textContent = STATE.inv[k]);
  });
  // Tasks badge: show if any completed but not claimed
  const hasPending = TASKS_CFG.some(c => {
    const done = (STATE.tasks.progress[c.id]||0) >= c.goal;
    return done && !STATE.tasks.claimed[c.id];
  });
  const tb = document.getElementById('tasks-badge');
  if(tb) tb.style.display = hasPending ? 'flex' : 'none';
}

// ====================== ACTIONS ======================
function buyAnimal(animal){
  const b = STATE.b[animal];
  const max = b.max[b.lvl-1];
  const cnt = getAliveCount(animal);
  if (cnt >= max) { toast('Нет места! Улучшите постройку.'); return; }
  if (STATE.ton < b.buy) { toast(`Нужно ${b.buy} TON! Нажми + рядом с TON`); return; }
  STATE.ton -= b.buy;
  b.animals.push({id:Date.now(), born:Date.now(), lastFed:Date.now(), alive:true});
  toast(`✨ Куплено за ${b.buy} TON! Животных: ${getAliveCount(animal)}`);
  saveGame();
  refresh();
}

function upgradeBuilding(animal){
  const b = STATE.b[animal];
  if (b.lvl >= 4) { toast('Максимальный уровень!'); return; }
  const cost = b.up[b.lvl-1];
  if (STATE.coins < cost) { toast(`Нужно ${fmt(cost)} монет!`); return; }
  STATE.coins -= cost;
  b.lvl++;
  toast(`🏗️ Улучшено до уровня ${b.lvl}!`);
  saveGame();
  refresh();
}

function feedAnimals(animal){
  const b = STATE.b[animal];
  const cnt = getAliveCount(animal);
  if(cnt===0){ toast('Нет животных для кормления'); return; }
  const fc = feedCost(animal);
  if((STATE.inv[fc.food]||0) < fc.amt){
    const fn={wheat:'пшеницы',corn:'кукурузы',carrot:'моркови'};
    toast(`Нужно ${fc.amt} ${fn[fc.food]||fc.food}! Есть: ${STATE.inv[fc.food]||0}`);
    return;
  }
  STATE.inv[fc.food] -= fc.amt;
  const now = Date.now();
  getAliveAnimals(animal).forEach(a=>{ a.lastFed = now; });
  // Track daily tasks
  if(animal==='chicken') addTaskProgress('feed_chicken');
  if(animal==='pig')     addTaskProgress('feed_pig');
  if(animal==='sheep')   addTaskProgress('feed_sheep');
  if(animal==='cow')     addTaskProgress('feed_cow');
  const nms={chicken:'Курочки',pig:'Свинки',sheep:'Овечки',cow:'Коровки'};
  toast(`🍞 ${nms[animal]||animal} накормлены!`);
  refresh();
}

function collectAnimal(animal){
  const b = STATE.b[animal];
  const amt = Math.floor(b.col);
  if (amt <= 0) { toast('Нечего собирать! Подождите.'); return; }
  b.col = 0;
  STATE.inv[b.prod] += amt;
  const cfg = ANIMALS[animal];
  if(animal==='chicken') addTaskProgress('collect_eggs', amt);
  if(animal==='cow')     addTaskProgress('collect_milk', amt);
  gainXP(amt * 2);
  toast(`+${amt} ${cfg.prodName} → склад!`);
  refresh();
}

let _pendingPlotId = null;
function openSeedModal(plotId){
  _pendingPlotId = plotId;
  // Populate seed grid dynamically — times always match CROPS config
  const grid = document.getElementById('seed-grid-content');
  if(grid){
    const emojis = {wheat:'🌾', corn:'🌽', carrot:'🥕', pumpkin:'🎃'};
    grid.innerHTML = Object.entries(CROPS).map(([key,c])=>
      `<div class="seed-item" onclick="plant('${key}')">
        <div class="seed-ic"><svg viewBox="0 0 24 24"><use href="#${c.ic}"/></svg></div>
        <div class="seed-info">
          <div class="s-nm">${c.nm}</div>
          <div class="s-time">⏱ ${fmtTime(c.growMs)}</div>
          <div class="s-cost">${emojis[key]} даёт ${c.yield} шт</div>
        </div>
      </div>`
    ).join('');
  }
  document.getElementById('modal-seed').classList.remove('hide');
}
function closeSeedModal(){
  document.getElementById('modal-seed').classList.add('hide');
  _pendingPlotId = null;
}
function plant(cropKey){
  if(_pendingPlotId===null) return;
  const plot = STATE.fields[_pendingPlotId];
  if(!plot || plot.state!=='empty'){ closeSeedModal(); return; }
  const crop = CROPS[cropKey];
  plot.crop = cropKey;
  plot.state = 'growing';
  plot.plantedAt = Date.now();
  plot.readyAt = Date.now() + crop.growMs;
  closeSeedModal();
  // Track daily tasks
  if(cropKey==='wheat') addTaskProgress('plant_wheat');
  if(cropKey==='corn')  addTaskProgress('plant_corn');
  toast(`🌱 ${crop.nm} посажена! Готово через ${fmtTime(crop.growMs)}`);
  refresh();
}
function harvestPlot(plotId){
  const plot = STATE.fields[plotId];
  if(!plot || plot.state!=='ready') return;
  const crop = CROPS[plot.crop];
  STATE.inv[plot.crop] = (STATE.inv[plot.crop]||0) + crop.yield;
  addTaskProgress('harvest');
  gainXP(crop.yield);
  toast(`🌾 +${crop.yield} ${crop.nm} → склад!`);
  plot.crop = null; plot.state = 'empty'; plot.plantedAt = 0; plot.readyAt = 0;
  refresh();
}

function sell(key, price){
  const amt = STATE.inv[key] || 0;
  if (amt <= 0) return;
  const earned = amt * price;
  STATE.coins += earned;
  STATE.inv[key] = 0;
  addTaskProgress('sell_100', earned);
  toast(`+${fmt(earned)} 🪙`);
  refresh();
}

function fulfill(id){
  const o = STATE.orders.find(x => x.id === id);
  if (!o) return;
  if (!Object.entries(o.n).every(([k,v]) => (STATE.inv[k]||0) >= v)) {
    toast('Не хватает ресурсов!'); return;
  }
  Object.entries(o.n).forEach(([k,v]) => { STATE.inv[k] -= v; });
  STATE.coins += o.r;
  STATE.gems += o.rg || 0;
  toast(`✅ +${o.r}🪙${o.rg?` +${o.rg}💎`:''}`);
  STATE.orders = STATE.orders.filter(x => x.id !== id);
  STATE.orders.push({id:Date.now(),t:'Новый заказ',n:{eggs:3,milk:2},r:400,rg:0});
  refresh();
}

function refresh(){
  // Re-render current screen
  const active = $('.screen.active');
  if (active && RENDERERS[active.id]) {
    active.innerHTML = RENDERERS[active.id]();
  }
  updateDisplays();
}

// ====================== TOAST ======================
let toastT;
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

// ====================== PRODUCTION SIMULATION ======================
setInterval(() => {
  const now = Date.now();
  // Animal production — only if fed
  Object.entries(STATE.b).forEach(([k, b]) => {
    const alive = getAliveAnimals(k);
    if(alive.length > 0){
      const fedCount = alive.filter(a => now-a.lastFed <= b.feedEvery).length;
      if(fedCount > 0){
        b.col += fedCount * b.rate;
      }
    }
  });
  // Update collected number in current animal screen
  Object.keys(STATE.b).forEach(k => {
    const el = document.getElementById(`${k}-collected`);
    if (el) el.textContent = Math.floor(STATE.b[k].col);
  });
  // Check field readiness
  STATE.fields.forEach(p => {
    if(p.state==='growing' && now >= p.readyAt){
      p.state = 'ready';
    }
  });
  // Check animal deaths every minute
  if(now % 60000 < 1100) checkAnimalDeaths();
}, 1000);

// Field timer tick — re-render fields screen if active
setInterval(() => {
  const active = document.querySelector('.screen.active');
  if(active && active.id === 'screen-fields'){
    active.innerHTML = RENDERERS['screen-fields']();
  }
}, 5000);

// ====================== TELEGRAM & SAFE AREA ======================
(function(){
  var tg = window.Telegram && window.Telegram.WebApp;
  var TG_HEADER = 44; // Telegram header is always ~44px

  // Probe CSS env(safe-area-inset-top) via computed style
  function getCSSTopInset(){
    try{
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);left:0;width:0;height:0;visibility:hidden;pointer-events:none;z-index:-1';
      document.body.appendChild(d);
      var v = parseInt(window.getComputedStyle(d).top) || 0;
      document.body.removeChild(d);
      return v;
    }catch(e){ return 0; }
  }

  function applyViewport(){
    var padTop = 0;
    var padBot = 0;

    if(tg){
      // === OPTION 1: contentSafeAreaInset.top ===
      // = iOS status bar + Telegram header (exact, combined)
      if(tg.contentSafeAreaInset && tg.contentSafeAreaInset.top > 5){
        padTop = tg.contentSafeAreaInset.top;
        padBot = tg.contentSafeAreaInset.bottom || 0;

      // === OPTION 2: safeAreaInset.top + TG header ===
      } else if(tg.safeAreaInset && tg.safeAreaInset.top > 0){
        padTop = tg.safeAreaInset.top + TG_HEADER;  // SUM, not max!
        padBot = tg.safeAreaInset.bottom || 0;

      // === OPTION 3: CSS env() probe + TG header ===
      } else {
        var cssTop = getCSSTopInset();
        padTop = cssTop + TG_HEADER;               // SUM: status bar + header
        padBot = 0;
      }
    } else {
      // Not in Telegram — only iOS safe area
      padTop = getCSSTopInset();
    }

    // Set both variables
    document.documentElement.style.setProperty('--pad-top',    padTop + 'px');
    document.documentElement.style.setProperty('--pad-bottom', padBot  + 'px');

    // Body and screen heights = full window height
    var vh = window.innerHeight;
    document.body.style.height = vh + 'px';
    document.querySelectorAll('.screen').forEach(function(s){
      s.style.height = vh + 'px';
    });
  }

  if(tg){
    try{
      tg.ready();
      tg.expand();
      if(tg.requestFullscreen) tg.requestFullscreen();
      if(tg.setHeaderColor) tg.setHeaderColor('#1E6FB0');
      if(tg.setBackgroundColor) tg.setBackgroundColor('#1E6FB0');
      if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();
      tg.onEvent('viewportChanged',        applyViewport);
      tg.onEvent('safeAreaChanged',        applyViewport);
      tg.onEvent('contentSafeAreaChanged', applyViewport);
    }catch(e){ console.warn('TG:', e); }
  }

  // Multiple attempts — Telegram API may not be ready immediately
  applyViewport();
  setTimeout(applyViewport, 80);
  setTimeout(applyViewport, 300);
  setTimeout(applyViewport, 800);

  window.addEventListener('resize', applyViewport);
  window.addEventListener('orientationchange', function(){ setTimeout(applyViewport, 300); });
})();

// ====================== SAVE / LOAD ======================
const SAVE_KEY = 'myFarm_v1';

function saveGame(){
  try {
    // Don't save the animals array prototype, just plain data
    var save = JSON.stringify(STATE);
    localStorage.setItem(SAVE_KEY, save);
  } catch(e){ /* storage unavailable */ }
}

function loadGame(){
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    var saved = JSON.parse(raw);
    // Merge saved into STATE carefully
    if(typeof saved.coins === 'number')    STATE.coins    = saved.coins;
    if(typeof saved.gems  === 'number')    STATE.gems     = saved.gems;
    if(typeof saved.ton   === 'number')    STATE.ton      = saved.ton;
    if(typeof saved.xp    === 'number')    STATE.xp       = saved.xp;
    if(typeof saved.farmLevel === 'number') STATE.farmLevel = saved.farmLevel;
    if(typeof saved.darkMode  === 'boolean') STATE.darkMode = saved.darkMode;
    if(saved.inv) Object.assign(STATE.inv, saved.inv);
    if(saved.tasks) Object.assign(STATE.tasks, saved.tasks);
    if(saved.fields) STATE.fields = saved.fields;
    if(saved.b){
      ['chicken','pig','sheep','cow'].forEach(function(k){
        if(saved.b[k]){
          STATE.b[k].lvl     = saved.b[k].lvl     || 1;
          STATE.b[k].col     = saved.b[k].col     || 0;
          STATE.b[k].animals = saved.b[k].animals || [];
        }
      });
    }
    return true;
  } catch(e){ return false; }
}

// Auto-save every 30 seconds and on key actions
setInterval(saveGame, 30000);

// Hook save into key functions
var _orig_refresh = refresh;
var _refreshCount = 0;
refresh = function(){
  _orig_refresh();
  _refreshCount++;
  if(_refreshCount % 3 === 0) saveGame(); // save every 3 refreshes
};

// ====================== CACHE BUSTING ======================
(function(){
  var CURRENT_VERSION = '2.1.0';
  var stored = '';
  try { stored = localStorage.getItem('farm_app_version') || ''; } catch(e){}

  function clearAndReload(){
    // Unregister service workers then clear caches then hard reload
    var doReload = function(){
      window.location.replace(window.location.href.split('?')[0] + '?v=' + CURRENT_VERSION);
    };
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(regs){
        var p = regs.map(function(r){ return r.unregister(); });
        return Promise.all(p);
      }).then(function(){
        if('caches' in window){
          return caches.keys().then(function(keys){
            return Promise.all(keys.map(function(k){ return caches.delete(k); }));
          });
        }
      }).then(doReload).catch(doReload);
    } else {
      doReload();
    }
  }

  if(stored && stored !== CURRENT_VERSION){
    // Version changed — clear cache and reload
    try { localStorage.setItem('farm_app_version', CURRENT_VERSION); } catch(e){}
    clearAndReload();
    return;
  }
  try { localStorage.setItem('farm_app_version', CURRENT_VERSION); } catch(e){}

  // Always silently unregister any stale service workers
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ r.unregister(); });
    }).catch(function(){});
  }
})();
